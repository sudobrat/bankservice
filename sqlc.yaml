version: "2"
sql:
  - engine: postgresql
    queries: "apps/backend/internal/db/queries/"
    schema: "apps/backend/internal/db/migrations/"
    gen:
      go:
        package: "bankdb"
        out: "apps/backend/internal/db/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
